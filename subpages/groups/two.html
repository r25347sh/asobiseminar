<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Group 2 - Asobi Lab.</title>
  
  <script src="/asobiseminar/js/load-css.js"></script>
  <script src="/asobiseminar/js/setThemeColor.js"></script>
</head>
<body>
  <main class="app-container group-content">
    <header style="margin-bottom: 60px;">
      <h1 style="color: var(--main-color); font-size: 3rem; font-weight: 900; text-shadow: 0 4px 12px rgba(0,0,0,0.3); letter-spacing: 0.05em; margin-bottom: 16px;">🏗️ Group 2</h1>
      <p style="opacity: 0.8; font-size: 1.1rem; margin: 0;">ファッションについて</p>
    </header>

    <section style="margin-bottom: 60px; line-height: 1.8;">
      <h2 style="border-left: 5px solid var(--main-color); padding-left: 15px; color: var(--main-color); font-size: 1.8rem; font-weight: 800; margin-bottom: 20px;">目標</h2>
      <p>「何を持っておしゃれと感じるのかを解き明かす」</p>
    </section>

    <section style="margin-bottom: 60px;">
      <h2 style="border-left: 5px solid var(--balance-color); padding-left: 15px; color: var(--balance-color); font-size: 1.8rem; font-weight: 800; margin-bottom: 20px;">2W1H</h2>
      <div class="task-board">
        <div class="task-box">
          <strong>What? 何を解き明かすのか</strong>
          <p style="opacity: 0.8; font-size: 0.9rem; margin-top: 8px;">「何をもっておしゃれというのか」</p>
        </div>
        <div class="task-box">
          <strong>Why? なぜそのテーマに興味を持ったのか</strong>
          <p style="opacity: 0.8; font-size: 0.9rem; margin-top: 8px;">「日常から話す「あの人おしゃれ」「あの人の服微妙」と感じたのはなぜ？と疑問に思ったから。」</p>
        </div>
        <div class="task-box">
          <strong>How? どのように進めたか</strong>
          <p style="opacity: 0.8; font-size: 0.9rem; margin-top: 8px;">「色んな人の考えを調査して情報を集め、共通点を見出し、そこから考察することで真相に迫る。」</p>
        </div>
      </div>
    </section>

    <section style="text-align: center; margin-top: 60px; padding-top: 40px; border-top: 1px solid var(--main-color);">
      <a href="/asobiseminar/subpages/groups/index.html" style="display: inline-block; padding: 14px 28px; background: linear-gradient(135deg, var(--main-color), var(--balance-color)); color: var(--variation-color); border-radius: 8px; font-weight: bold; text-decoration: none;">➔ グループ一覧に戻る</a>
    </section>
  </main>

</body>
</html>
