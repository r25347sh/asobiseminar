<!-- settings.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>設定 - Asobi Seminar</title>
  <script src="/asobiseminar/js/load-css.js"></script>
  <script src="/asobiseminar/js/setThemeColor.js"></script>
</head>
<body>
  <main style="padding: 40px; font-family: sans-serif; color: var(--variation-color); background: var(--accent-color); min-height: 100vh;">
    <h2 style="color: var(--main-color);">テーマカラー設定</h2>
    
    <label style="display:block; margin-bottom:10px;">好きなテーマを選択してください：</label>
    <select id="theme-select" style="margin-bottom: 20px; width: 100%; max-width: 300px; padding: 12px; background: rgba(255,255,255,0.1); color: var(--variation-color); border: 1px solid var(--balance-color); border-radius: 6px;">
      <!-- 💡 ここにJSONの中身が「全自動」で無限に並びます -->
    </select>
    
    <br>
    <button id="save-btn" style="padding: 12px 24px; background: var(--main-color); color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">
      テーマを保存する
    </button>
  </main>

  <script>
    const selectEl = document.getElementById('theme-select');
    const saveBtn = document.getElementById('save-btn');

    // JSONからテーマ一覧を自動取得してセレクトボックスを構築するタスク
    fetch('/asobiseminar/themecolor.json')
      .then(res => res.json())
      .then(themes => {
        themes.forEach(theme => {
          const option = document.createElement('option');
          option.value = theme.name;
          option.textContent = theme.name;
          // セレクトボックス内の文字の見た目もテーマ連動に
          option.style.backgroundColor = '#111'; 
          option.style.color = '#fff';
          selectEl.appendChild(option);
        });

        // 現在保存されているテーマを選択状態にする
        const currentTheme = localStorage.getItem('selectedTheme');
        if (currentTheme) {
          selectEl.value = currentTheme;
        }
      });

    // 保存ボタンの処理
    saveBtn.addEventListener('click', () => {
      localStorage.setItem('selectedTheme', selectEl.value);
      alert('魔導テーマを書き換えました！ページを更新します。');
      location.reload(); 
    });
  </script>
</body>
</html>
